apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: dast
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: app-reservas/notification-service:ci
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
          env:
            - name: EMAIL_HOST
              value: "sandbox.smtp.mailtrap.io"
            - name: EMAIL_PORT
              value: "2525"
            - name: EMAIL_USER
              value: "ci-test"
            - name: EMAIL_PASS
              value: "ci-test"
            - name: PORT
              value: "5002"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            tcpSocket:
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: dast
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 5002
      targetPort: 5002
  type: ClusterIP
