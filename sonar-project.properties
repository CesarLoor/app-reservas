sonar.projectKey=app-reservas
sonar.projectName=app-reservas
sonar.projectVersion=1.0.0

sonar.host.url=http://localhost:9001
sonar.sourceEncoding=UTF-8

sonar.sources=auth-service/src,booking-service/src,notification-service,user-service,frontend/src
sonar.inclusions=**/*.js,**/*.jsx,**/*.ts,**/*.tsx
sonar.exclusions=**/node_modules/**,**/coverage/**,**/.next/**,**/*.test.js,**/*.spec.js,.github/**,qualitygate.json,backend-quality-report.md,docker-compose.sonar.yml,docker-compose.sonarqube.yml,tools/**
sonar.coverage.exclusions=auth-service/src/app.js,booking-service/src/app.js,notification-service/index.js,user-service/index.js,frontend/src/**/*.tsx,frontend/src/types.ts
sonar.javascript.lcov.reportPaths=auth-service/coverage/lcov.info,booking-service/coverage/lcov.info,notification-service/coverage/lcov.info,user-service/coverage/lcov.info,frontend/coverage/lcov.info

sonar.links.homepage=https://github.com/your-org/app-reservas
sonar.links.scm=https://github.com/your-org/app-reservas
sonar.qualitygate.wait=true
