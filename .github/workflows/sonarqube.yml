name: SonarQube Project Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  scan:
    name: Scan project with SonarQube
    runs-on: ubuntu-latest

    services:
      sonarqube-db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sonar
          POSTGRES_PASSWORD: sonar
          POSTGRES_DB: sonarqube
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      sonarqube:
        image: sonarqube:lts-community
        ports:
          - 9000:9000
        env:
          SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
          SONAR_JDBC_USERNAME: sonar
          SONAR_JDBC_PASSWORD: sonar
        options: >-
          --health-cmd "curl -s http://localhost:9000/api/system/status | grep -o '\"status\":\"UP\"'"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for SonarQube
        shell: bash
        run: |
          echo "Waiting for SonarQube to be ready..."
          for i in {1..30}; do
            status=$(curl -s http://localhost:9000/api/system/status | grep -o '"status":"UP"' || true)
            if [ "$status" = '"status":"UP"' ]; then
              exit 0
            fi
            sleep 10
          done
          echo "SonarQube did not become ready in time"
          curl -s http://localhost:9000/api/system/status || true
          exit 1

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000
        with:
          args: >
            -Dsonar.projectKey=app-reservas
            -Dsonar.projectName=app-reservas
            -Dsonar.sources=auth-service/src,booking-service/src,notification-service,user-service,frontend/src
            -Dsonar.inclusions=**/*.js,**/*.jsx,**/*.ts,**/*.tsx
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**,**/.next/**,**/*.test.js,**/*.spec.js,.github/**
            -Dsonar.qualitygate.wait=true
