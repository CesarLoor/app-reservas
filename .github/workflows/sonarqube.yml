name: SonarQube Project Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  scan:
    name: Scan project with SonarQube
    runs-on: ubuntu-latest

    services:
      sonarqube-db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sonar
          POSTGRES_PASSWORD: sonar
          POSTGRES_DB: sonarqube
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      sonarqube:
        image: sonarqube:lts-community
        ports:
          - 9000:9000
        env:
          SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
          SONAR_JDBC_USERNAME: sonar
          SONAR_JDBC_PASSWORD: sonar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies and generate coverage
        shell: bash
        run: |
          for package_dir in auth-service booking-service notification-service user-service frontend; do
            npm ci --prefix "$package_dir"
            npm run test:coverage --prefix "$package_dir"
          done

      - name: Wait for SonarQube
        shell: bash
        run: |
          echo "Waiting for SonarQube to be ready..."
          for i in {1..30}; do
            status=$(curl -s http://localhost:9000/api/system/status | grep -o '"status":"UP"' || true)
            if [ "$status" = '"status":"UP"' ]; then
              exit 0
            fi
            sleep 10
          done
          echo "SonarQube did not become ready in time"
          curl -s http://localhost:9000/api/system/status || true
          exit 1

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://sonarqube:9000
        with:
          args: >
            -Dsonar.host.url=http://sonarqube:9000
            -Dsonar.projectKey=app-reservas
            -Dsonar.projectName=app-reservas
            -Dsonar.sources=auth-service/src,booking-service/src,notification-service,user-service,frontend/src
            -Dsonar.inclusions=**/*.js,**/*.jsx,**/*.ts,**/*.tsx
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**,**/.next/**,**/*.test.js,**/*.spec.js,.github/**
            -Dsonar.coverage.exclusions=auth-service/src/app.js,booking-service/src/app.js,notification-service/index.js,user-service/index.js,frontend/src/**/*.tsx,frontend/src/types.ts
            -Dsonar.javascript.lcov.reportPaths=auth-service/coverage/lcov.info,booking-service/coverage/lcov.info,notification-service/coverage/lcov.info,user-service/coverage/lcov.info,frontend/coverage/lcov.info
            -Dsonar.qualitygate.wait=true
