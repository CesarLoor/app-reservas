name: SonarQube Project Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  scan:
    name: Scan project with SonarQube
    runs-on: ubuntu-latest

    services:
      sonarqube-db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sonar
          POSTGRES_PASSWORD: sonar
          POSTGRES_DB: sonarqube
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      sonarqube:
        image: sonarqube:lts-community
        ports:
          - 9000:9000
        env:
          SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
          SONAR_JDBC_USERNAME: sonar
          SONAR_JDBC_PASSWORD: sonar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for SonarQube to be ready
        run: |
          echo "Waiting for SonarQube to be ready..."
          for i in {1..40}; do
            STATUS=$(curl -s http://localhost:9000/api/system/status | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "UP" ]; then
              echo "SonarQube is UP after $i attempts"
              exit 0
            fi
            echo "Attempt $i/40 — status: '$STATUS', waiting 15s..."
            sleep 15
          done
          echo "SonarQube did not start in time"
          exit 1

      - name: Generate SonarQube token for this run
        id: sonar-token
        run: |
          RESPONSE=$(curl -s -X POST "http://localhost:9000/api/user_tokens/generate" \
            -u admin:admin \
            --data-urlencode "name=ci-run-${{ github.run_id }}")
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Token generated successfully"

      - name: Install sonar-scanner
        run: |
          SONAR_SCANNER_VERSION=5.0.1.3006
          curl -sSLo sonar-scanner.zip \
            "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux.zip"
          unzip -q sonar-scanner.zip
          echo "$PWD/sonar-scanner-${SONAR_SCANNER_VERSION}-linux/bin" >> $GITHUB_PATH

      - name: Run SonarQube analysis
        run: |
          sonar-scanner \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.login="${{ steps.sonar-token.outputs.token }}" \
            -Dsonar.projectKey=app-reservas \
            -Dsonar.projectName=app-reservas \
            -Dsonar.sources=auth-service/src,booking-service/src,notification-service,user-service,frontend/src \
            -Dsonar.inclusions="**/*.js,**/*.jsx,**/*.ts,**/*.tsx" \
            -Dsonar.exclusions="**/node_modules/**,**/coverage/**,**/.next/**,**/*.test.js,**/*.spec.js,.github/**" \
            -Dsonar.qualitygate.wait=true

      - name: Generate SonarQube Markdown report
        if: always()
        env:
          SONAR_TOKEN_CI: ${{ steps.sonar-token.outputs.token }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_SHA: ${{ github.sha }}
          GH_BRANCH: ${{ github.ref_name }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          GH_SERVER: ${{ github.server_url }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, base64, datetime, os

          BASE    = "http://localhost:9000"
          PROJECT = "app-reservas"
          TOKEN   = os.environ["SONAR_TOKEN_CI"]
          RUN_ID  = os.environ["GH_RUN_ID"]
          SHA     = os.environ["GH_SHA"]
          SHORT   = SHA[:7]
          BRANCH  = os.environ["GH_BRANCH"]
          ACTOR   = os.environ["GH_ACTOR"]
          REPO    = os.environ["GH_REPO"]
          SERVER  = os.environ["GH_SERVER"]
          NOW     = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")

          COMMIT_URL = f"{SERVER}/{REPO}/commit/{SHA}"
          RUN_URL    = f"{SERVER}/{REPO}/actions/runs/{RUN_ID}"

          creds   = base64.b64encode(f"{TOKEN}:".encode()).decode()
          headers = {"Authorization": f"Basic {creds}"}

          def api(path):
              try:
                  req = urllib.request.Request(f"{BASE}{path}", headers=headers)
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except Exception as e:
                  return {"error": str(e)}

          # Quality Gate
          qg_resp       = api(f"/api/qualitygates/project_status?projectKey={PROJECT}")
          qg_status     = qg_resp.get("projectStatus", {}).get("status", "UNKNOWN")
          qg_conditions = qg_resp.get("projectStatus", {}).get("conditions", [])

          # Metrics
          metric_keys = [
              "ncloc","bugs","vulnerabilities","code_smells","coverage",
              "duplicated_lines_density","sqale_debt_ratio","sqale_index",
              "complexity","cognitive_complexity",
              "blocker_violations","critical_violations","major_violations",
              "security_hotspots","security_hotspots_reviewed"
          ]
          m_resp   = api(f"/api/measures/component?component={PROJECT}&metricKeys={','.join(metric_keys)}")
          measures = {m["metric"]: m.get("value", "–")
                      for m in m_resp.get("component", {}).get("measures", [])}

          def val(k): return measures.get(k, "–")

          PASSED     = qg_status == "OK"
          GATE_ICON  = "✅" if PASSED else "❌"
          GATE_LABEL = "PASSED" if PASSED else "FAILED"
          CMP        = {"GT": ">", "LT": "<", "EQ": "=", "NE": "≠"}

          cond_rows = ""
          for c in qg_conditions:
              icon = "✅" if c.get("status") == "OK" else "❌"
              cond_rows += (
                  f"| {icon} | `{c.get('metricKey', '')}` "
                  f"| {CMP.get(c.get('comparator', ''), c.get('comparator', ''))} "
                  f"| `{c.get('errorThreshold', '–')}` "
                  f"| **{c.get('actualValue', '–')}** |\n"
              )

          gate_msg = (
              "> ✅ **El código cumple todos los umbrales del Quality Gate `StrictGate`.**"
              if PASSED else
              "> ❌ **El código NO cumple los umbrales del Quality Gate `StrictGate`. Revisa las condiciones fallidas.**"
          )

          report = f"""# 📊 Reporte de Análisis SonarQube — `{PROJECT}`

> **Rama:** `{BRANCH}` &nbsp;|&nbsp; **Commit:** [`{SHORT}`]({COMMIT_URL}) &nbsp;|&nbsp; **Autor:** `{ACTOR}` &nbsp;|&nbsp; **Fecha:** {NOW}

---

## {GATE_ICON} Quality Gate — {GATE_LABEL}

{gate_msg}

### Condiciones evaluadas (Quality Gate: StrictGate)

| Estado | Métrica | Cond. | Umbral | Valor actual |
|:------:|---------|:-----:|:------:|:------------:|
{cond_rows}
---

## 📈 Resumen de Métricas

| Categoría | Métrica | Valor |
|-----------|---------|:-----:|
| 📏 Tamaño | Líneas de código (NCLOC) | **{val('ncloc')}** |
| 🐛 Confiabilidad | Bugs | **{val('bugs')}** |
| 🔐 Seguridad | Vulnerabilidades | **{val('vulnerabilities')}** |
| 🔐 Seguridad | Security Hotspots | **{val('security_hotspots')}** |
| 🔐 Seguridad | Hotspots revisados (%) | **{val('security_hotspots_reviewed')}** |
| 🧹 Mantenibilidad | Code Smells | **{val('code_smells')}** |
| 🧹 Mantenibilidad | Deuda técnica (min) | **{val('sqale_index')}** |
| 🧹 Mantenibilidad | Debt ratio (%) | **{val('sqale_debt_ratio')}** |
| 🧪 Cobertura | Coverage (%) | **{val('coverage')}** |
| 📋 Duplicación | Líneas duplicadas (%) | **{val('duplicated_lines_density')}** |
| 🔁 Complejidad | Ciclomática | **{val('complexity')}** |
| 🔁 Complejidad | Cognitiva | **{val('cognitive_complexity')}** |
| 🚨 Issues | Blocker | **{val('blocker_violations')}** |
| 🚨 Issues | Critical | **{val('critical_violations')}** |
| 🚨 Issues | Major | **{val('major_violations')}** |

---

## ℹ️ Información del análisis

| Campo | Valor |
|-------|-------|
| Proyecto | `{PROJECT}` |
| Rama | `{BRANCH}` |
| Commit | [`{SHORT}`]({COMMIT_URL}) |
| Autor | `{ACTOR}` |
| Repositorio | [{REPO}]({SERVER}/{REPO}) |
| GitHub Actions Run | [Ver ejecución]({RUN_URL}) |
| Fecha (UTC) | {NOW} |
| SonarQube | 9.9.x Community Edition |

---

*Reporte generado automáticamente por `.github/workflows/sonarqube.yml`*
"""

          os.makedirs("sonarqube-report", exist_ok=True)

          # Guardar como REPORTE.md (artefacto descargable)
          with open("sonarqube-report/REPORTE.md", "w", encoding="utf-8") as f:
              f.write(report)

          # Escribir en el Job Summary de GitHub Actions (se renderiza en la UI)
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary_path:
              with open(summary_path, "w", encoding="utf-8") as f:
                  f.write(report)

          print(f"Reporte generado — Quality Gate: {GATE_LABEL}")
          PYEOF

      - name: Upload REPORTE.md as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-report-${{ github.run_id }}
          path: sonarqube-report/REPORTE.md
          retention-days: 14
