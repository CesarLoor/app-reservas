name: SonarQube Project Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  scan:
    name: Scan project with SonarQube
    runs-on: ubuntu-latest

    services:
      sonarqube-db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sonar
          POSTGRES_PASSWORD: sonar
          POSTGRES_DB: sonarqube
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      sonarqube:
        image: sonarqube:lts-community
        ports:
          - 9000:9000
        env:
          SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
          SONAR_JDBC_USERNAME: sonar
          SONAR_JDBC_PASSWORD: sonar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for SonarQube
        shell: bash
        run: |
          echo "Waiting for SonarQube to be ready..."
          for i in {1..30}; do
            status=$(curl -s http://localhost:9000/api/system/status | grep -o '"status":"UP"' || true)
            if [ "$status" = '"status":"UP"' ]; then
              exit 0
            fi
            sleep 10
          done
          echo "SonarQube did not become ready in time"
          curl -s http://localhost:9000/api/system/status || true
          exit 1

      - name: Create SonarQube token
        id: sonar-token
        shell: bash
        env:
          SONAR_HOST_URL: http://localhost:9000
          SONAR_ADMIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}-SonarQube
        run: |
          set -euo pipefail

          curl -fsS -u admin:admin -X POST "${SONAR_HOST_URL}/api/users/change_password" \
            -d "login=admin" \
            -d "previousPassword=admin" \
            -d "password=${SONAR_ADMIN_PASSWORD}" \
            > /dev/null

          token_response=$(curl -fsS -u "admin:${SONAR_ADMIN_PASSWORD}" -X POST "${SONAR_HOST_URL}/api/user_tokens/generate" \
            --data-urlencode "name=github-actions-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}")
          sonar_token=$(echo "$token_response" | jq -r '.token')

          if [ -z "$sonar_token" ] || [ "$sonar_token" = "null" ]; then
            echo "Failed to generate SonarQube token"
            exit 1
          fi

          echo "::add-mask::$sonar_token"
          echo "SONAR_TOKEN=$sonar_token" >> "$GITHUB_ENV"

      - name: Configure StrictGate
        shell: pwsh
        run: |
          ./tools/sonarqube/create-strictgate.ps1 `
            -SonarUrl "http://localhost:9000" `
            -Token "$env:SONAR_TOKEN" `
            -ProjectKey "app-reservas" `
            -ProjectName "app-reservas"

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_HOST_URL: http://localhost:9000
        with:
          args: >
            -Dsonar.host.url=http://localhost:9000
            -Dsonar.projectKey=app-reservas
            -Dsonar.projectName=app-reservas
            -Dsonar.sources=auth-service/src,booking-service/src,notification-service,user-service,frontend/src
            -Dsonar.inclusions=**/*.js,**/*.jsx,**/*.ts,**/*.tsx
            -Dsonar.exclusions=**/node_modules/**,**/coverage/**,**/.next/**,**/*.test.js,**/*.spec.js,.github/**
            -Dsonar.qualitygate.wait=true
