name: SonarQube Quality Gate

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  sonarqube:
    name: Analyze code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            auth-service/package-lock.json
            booking-service/package-lock.json
            notification-service/package-lock.json
            user-service/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          npm ci --prefix auth-service
          npm ci --prefix booking-service
          npm ci --prefix notification-service
          npm ci --prefix user-service
          npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Run SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=reservas-ec
            -Dsonar.projectName=ReservasEC
            -Dsonar.sources=auth-service/src,booking-service/src,notification-service,user-service,frontend/src
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/package-lock.json
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
