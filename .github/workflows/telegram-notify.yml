name: đź“¬ Telegram Notify on Push

on:
  push:
    branches:
      - main
      - develop
      - '**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  notify-telegram:
    name: Send Telegram Notification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | head -20 | tr '\n' ', ' | sed 's/,$//')
          else
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null | head -20 | tr '\n' ', ' | sed 's/,$//')
          fi
          if [ -z "$FILES" ]; then
            FILES="(archivos iniciales)"
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Build Telegram message
        id: build-message
        run: |
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          AUTHOR="${{ github.actor }}"
          COMMIT="${{ github.sha }}"
          SHORT_COMMIT="${COMMIT:0:7}"
          FILES="${{ steps.changed-files.outputs.files }}"

          if [ "$EVENT" = "pull_request" ]; then
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_NUM="${{ github.event.pull_request.number }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            MESSAGE="đź”€ *Pull Request #${PR_NUM}*%0A%0Ađź“Ś *Repo:* \`${REPO}\`%0AđźŚż *Rama:* \`${BRANCH}\`%0Ađź‘¤ *Autor:* \`${AUTHOR}\`%0Ađź“ť *TĂ­tulo:* ${PR_TITLE}%0Ađź“„ *Archivos:* \`${FILES}\`%0Ađź”— [Ver PR](${PR_URL})"
          else
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT}"
            MESSAGE="đźš€ *Nuevo Push Detectado*%0A%0Ađź“Ś *Repo:* \`${REPO}\`%0AđźŚż *Rama:* \`${BRANCH}\`%0Ađź‘¤ *Autor:* \`${AUTHOR}\`%0Ađź”– *Commit:* \`${SHORT_COMMIT}\`%0Ađź’¬ *Mensaje:* ${COMMIT_MSG}%0Ađź“„ *Archivos modificados:*%0A\`${FILES}\`%0Ađź”— [Ver commit](${COMMIT_URL})"
          fi

          echo "message=$MESSAGE" >> $GITHUB_OUTPUT

      - name: Send notification to Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${{ steps.build-message.outputs.message }}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview="false"
