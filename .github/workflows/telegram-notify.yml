name: 📬 Telegram Notify on Push

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  notify-telegram:
    name: Send Telegram Notification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send notification to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          BEFORE: ${{ github.event.before }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          EVENT: ${{ github.event_name }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, subprocess, html

          repo        = os.environ.get('REPO', '')
          branch      = os.environ.get('BRANCH', '')
          author      = os.environ.get('AUTHOR', '')
          sha         = os.environ.get('SHA', '')
          short_sha   = sha[:7] if sha else ''
          commit_msg  = os.environ.get('COMMIT_MSG', '')
          event       = os.environ.get('EVENT', 'push')
          token       = os.environ.get('BOT_TOKEN', '')
          chat_id     = os.environ.get('CHAT_ID', '')
          before      = os.environ.get('BEFORE', '')

          # Obtener archivos modificados
          try:
              if before and before != '0000000000000000000000000000000000000000':
                  result = subprocess.run(
                      ['git', 'diff', '--name-only', before, sha],
                      capture_output=True, text=True
                  )
              else:
                  result = subprocess.run(
                      ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD'],
                      capture_output=True, text=True
                  )
              files_list = [f for f in result.stdout.strip().split('\n') if f][:15]
              files = '\n  * ' + '\n  * '.join(files_list) if files_list else '(archivos iniciales)'
          except Exception:
              files = '(no disponible)'

          commit_url = f"https://github.com/{repo}/commit/{sha}"

          # Escapar caracteres especiales HTML en valores dinámicos
          def e(s): return html.escape(str(s))

          if event == 'pull_request':
              pr_title = os.environ.get('PR_TITLE', '')
              pr_num   = os.environ.get('PR_NUM', '')
              pr_url   = os.environ.get('PR_URL', '')
              text = (
                  f"🔀 <b>Pull Request #{e(pr_num)}</b>\n\n"
                  f"📌 <b>Repo:</b> {e(repo)}\n"
                  f"🌿 <b>Rama:</b> {e(branch)}\n"
                  f"👤 <b>Autor:</b> {e(author)}\n"
                  f"📝 <b>Titulo:</b> {e(pr_title)}\n"
                  f"📄 <b>Archivos:</b>{e(files)}\n"
                  f"🔗 <a href=\"{pr_url}\">Ver PR</a>"
              )
          else:
              text = (
                  f"🚀 <b>Nuevo Push Detectado</b>\n\n"
                  f"📌 <b>Repo:</b> {e(repo)}\n"
                  f"🌿 <b>Rama:</b> {e(branch)}\n"
                  f"👤 <b>Autor:</b> {e(author)}\n"
                  f"🔖 <b>Commit:</b> {e(short_sha)}\n"
                  f"💬 <b>Mensaje:</b> {e(commit_msg)}\n"
                  f"📄 <b>Archivos modificados:</b>{e(files)}\n"
                  f"🔗 <a href=\"{commit_url}\">Ver commit</a>"
              )

          payload = json.dumps({
              "chat_id": chat_id,
              "text": text,
              "parse_mode": "HTML",
              "disable_web_page_preview": False
          }).encode('utf-8')

          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=payload,
              headers={"Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req) as response:
                  print("Notificacion enviada a Telegram exitosamente")
          except urllib.error.HTTPError as e:
              print(f"Error HTTP: {e.code} - {e.read().decode()}")
              raise SystemExit(1)
          PYEOF
