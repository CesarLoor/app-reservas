          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          script: |
            const token = process.env.TELEGRAM_BOT_TOKEN;
            const chatId = process.env.TELEGRAM_CHAT_ID;

            if (!token || !chatId) {
              core.setFailed('Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID repository secret.');
              return;
            }

            const payload = context.payload;
            const branch = payload.ref.replace('refs/heads/', '');
            const commits = payload.commits || [];
            const latest = commits[commits.length - 1];

            if (!latest) {
              core.info('No commits found in push payload.');
              return;
            }

            const files = new Set();
            for (const commit of commits) {
              for (const file of [...(commit.added || []), ...(commit.modified || []), ...(commit.removed || [])]) {
                files.add(file);
              }
            }

            const escapeHtml = (value) => String(value)
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;');

            const fileList = [...files].slice(0, 20).map((file) => `- ${escapeHtml(file)}`).join('\n') || '- Sin archivos reportados';
            const suffix = files.size > 20 ? `\n- ... y ${files.size - 20} archivo(s) mas` : '';
            const author = latest.author?.name || payload.pusher?.name || 'Autor no identificado';

            const message = [
              '<b>ReservasEC: nuevo push</b>',
              `<b>Autor:</b> ${escapeHtml(author)}`,
              `<b>Rama:</b> ${escapeHtml(branch)}`,
              `<b>Commit:</b> <a href="${latest.url}">${latest.id.substring(0, 7)}</a>`,
              '<b>Archivos modificados:</b>',
              `<pre>${fileList}${suffix}</pre>`,
              '',
              'El resultado de SonarQube queda disponible en el workflow SonarQube Quality Gate.'
            ].join('\n');

